services:
  backend:
    build: ./server
    ports:
      - "5001:5000"
    env_file:
      - .env
    volumes:
      - ./server:/app
      - backend_modules:/app/node_modules

  frontend:
    build: ./MS-CFG-Project
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    volumes:
      - ./MS-CFG-Project:/app
      - frontend_modules:/app/node_modules

volumes:
  backend_modules:
  frontend_modules:
